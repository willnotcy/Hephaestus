---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app omada-controller
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      omada-controller:
        initContainers:
          init-permissions:
            image: 
              repository: busybox
              tag: 1.36.1
            securityContext:
              runAsUser: 0
            command:
              - sh
              - -c
              - |
                mkdir -p /opt/tplink/EAPController/data /opt/tplink/EAPController/work /opt/tplink/EAPController/logs
                chown -R 1000:1000 /opt/tplink/EAPController/                
        containers:
          app:
            image:
              repository: mbentley/omada-controller
              tag: 6.2.10.17
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            env:
              - name: TZ
                value: Europe/Copenhagen
              - name: MANAGE_HTTP_PORT
                value: "8088"
              - name: MANAGE_HTTPS_PORT
                value: "8043"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
    service:
      main:
        controller: omada-controller
        ports:
          http:
            port: 8088
      device-adoption:
        controller: omada-controller
        type: LoadBalancer
        loadBalancerIP: 192.168.20.248
        ports:
          discovery:
            port: 27001
            protocol: UDP
          adoption:
            port: 27002
          device-comm-1:
            port: 29811
          device-comm-2:
            port: 29812
          device-comm-3:
            port: 29813
          device-comm-4:
            port: 29814
          device-https:
            port: 8043
          portal-https:
            port: 8843
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /opt/tplink/EAPController/data
      work:
        type: emptyDir
        globalMounts:
          - path: /opt/tplink/EAPController/work
      logs: 
        type: emptyDir
        globalMounts:
          - path: /opt/tplink/EAPController/logs          
