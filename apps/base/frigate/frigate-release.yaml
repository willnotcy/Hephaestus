apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app frigate
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      frigate:
        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: v0.17.1
            env:
              - name: TZ
                value: Europe/Copenhagen
            resources:
              requests:
                gpu.intel.com/i915: 1
              limits:
                gpu.intel.com/i915: 1
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

    service:
      app:
        controller: frigate
        ports:
          http:
            port: &webport 8971
          rtsp:
            enabled: true
            port: 8554

    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          frigate:
            app:
              - path: /config

      media:
        existingClaim: frigate-media
        advancedMounts:
          frigate:
            app:
              - path: /media/frigate

      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        advancedMounts:
          frigate:
            app:
              - path: /dev/dri

      shm:
        type: emptyDir
        medium: Memory
        advancedMounts:
          frigate:
            app:
              - path: /dev/shm
