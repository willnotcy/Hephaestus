apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      vaultwarden:
        containers:
          app:
            image:
              repository: vaultwarden/server
              tag: 1.36.0
            envFrom:
              - secretRef:
                  name: *app
            env:
              DOMAIN: "https://${SUBDOMAIN:=bitwarden}.hephaestus.markmk.com"
              SIGNUPS_ALLOWED: "false"
              WEBSOCKET_ENABLED: "true"
              TZ: Europe/Copenhagen
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            probes:
              liveness:
                enabled: true
                path: /alive
              readiness:
                enabled: true
                path: /alive
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: vaultwarden
        ports:
          http:
            port: &port 80
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
