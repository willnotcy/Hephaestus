apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app freshrss
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      freshrss:
        containers:
          app:
            image:
              repository: freshrss/freshrss
              tag:  1.29.0
            env:
              TZ: Europe/Copenhagen
              CRON_MIN: 18,48
              DOMAIN: "freshrss.hephaestus.markmk.com"
              LISTEN: &port 8080

    service:
      app:
        controller: freshrss
        ports:
          http:
            port: *port


    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          freshrss:
            app:
              - path: /var/www/FreshRSS/data
                subPath: data
              - path: /var/www/FreshRSS/extensions
                subPath: extensions

      tmpfs:
        type: emptyDir
        advancedMounts:
          freshrss:
            app:
              - path: /var/www/FreshRSS/data/cache
                subPath: cache