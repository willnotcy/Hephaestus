apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app privatebin
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      privatebin:
        containers:
          app:
            image:
              repository: privatebin/nginx-fpm-alpine
              tag: 2.0.4
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            probes:
              liveness:
                enabled: true
                custom: true
              readiness:
                enabled: true
                custom: true
    service:
      app:
        controller: privatebin
        ports:
          http:
            port: &port 8080
    persistence:
      data:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
