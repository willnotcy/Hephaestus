---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: metallb-system
      version: "0.15.3"
  valuesFrom:
  - kind: ConfigMap
    name: metallb-values
    valuesKey: values.yaml
    optional: true
  interval: 1h
  releaseName: metallb
  targetNamespace: metallb-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace